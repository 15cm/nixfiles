# ==========================================
# Custom Tmux Configuration (Darwin / macOS)
# Derived from amane's tmux configuration
# ==========================================

# https://github.com/sxyazi/yazi/wiki/Image-preview-within-tmux
if-shell "tmux -V | awk '{split(\$2,v,\"[a-z]\"); if (v[1] >= 3.3) exit 0; else exit 1}'" \
  "set -g allow-passthrough on"

# True color settings
set -g default-terminal "$TERM"
set -ag terminal-overrides ",$TERM:Tc"

set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set-environment -g TMUX_FZF_SWITCH_CURRENT "1"

# https://stackoverflow.com/questions/18600188/home-end-keys-do-not-work-in-tmux
bind-key -n Home send Escape "OH"
bind-key -n End send Escape "OF"

# Set prefix to F8 (as configured in Nix)
set -g prefix F8
unbind C-b
bind F8 send-prefix

# Start window and pane numbering at 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on


bind R source-file ~/.config/tmux/tmux.conf\; display-message "~/.config/tmux/tmux.conf reloaded"
bind z confirm-before "kill-window"
bind Z confirm-before "kill-session"
bind e command-prompt -p "New Session:" "new-session -A -s '%%'"
bind ^D detach

# Switch session via tmux-fzf (looks for Homebrew prefix or standard TPM paths)
bind-key s run-shell -b "if [ -f /opt/homebrew/share/tmux-fzf/scripts/session.sh ]; then /opt/homebrew/share/tmux-fzf/scripts/session.sh switch; else ~/.tmux/plugins/tmux-fzf/scripts/session.sh switch; fi"

# Pane navigation
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[bold],} #P #{=|24|...:pane_current_command} [#{b:pane_current_path}] @#H#{?pane_in_mode, [#{pane_mode}],}#{?pane_synchronized, [sync],} #[default]"
bind-key h   select-pane -L
bind-key j   select-pane -D
bind-key k   select-pane -U
bind-key l   select-pane -R

# Pane movement
bind '@' command-prompt -p "join pane from:"  "join-pane -s '%%'"
bind '#' command-prompt -p "send pane to:" "join-pane -t '%%'"

# Pane rotation
bind K rotate -U
bind J rotate -D

# Pane split
bind-key "|" split-window -h -c "#{pane_current_path}"
bind-key "\\" split-window -fh -c "#{pane_current_path}"
bind-key "-" split-window -v -c "#{pane_current_path}"
bind-key "_" split-window -fv -c "#{pane_current_path}"
bind-key "%" split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"

# Pane resize
bind-key -r -T prefix M-k resize-pane -U 5
bind-key -r -T prefix M-j resize-pane -D 5
bind-key -r -T prefix M-l resize-pane -L 5
bind-key -r -T prefix M-r resize-pane -R 5

# Zoom pane to maximum size.
bind a "resize-pane -Z"

# New window
bind c new-window -c "#{pane_current_path}"

# Window reordering
bind < swap-window -t -1\; select-window -t -1
bind > swap-window -t +1\; select-window -t +1

# clean history
bind , send-keys -R \; run "sleep 0.1" \; clear-history

# Copy mode key bindings
setw -g mode-keys vi
bind-key -T copy-mode-vi v   send -X begin-selection
bind-key -T copy-mode-vi V   send -X select-line
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi 'Y' send-keys -X copy-pipe "pbcopy"

# Press C-q to disable/enable prefix for outer session
bind -T root C-q  \
  set prefix None \;\
  set key-table off \;\
  refresh-client -S \;\

bind -T off C-q \
  set -u prefix \;\
  set -u key-table \;\
  refresh-client -S

# --------------------- Modern & Premium Status Bar ---------------------
# Elegant minimalist style fitting high-end developer environments
set -g status-style bg=default,fg=white
set -g status-left-length 40
set -g status-left "#[fg=green,bold]❐ #S #[fg=white,nobold]| "
set -g status-right-length 80
set -g status-right "#[fg=cyan]⧉ #H #[fg=white]| #[fg=yellow]⏰ %H:%M #[fg=white]| #[fg=magenta]📅 %Y-%m-%d"
set -g window-status-format "#[fg=gray]#I:#W"
set -g window-status-current-format "#[fg=blue,bold]#I:#W*"
set -g status-justify left

# --------------------- TPM (Tmux Plugin Manager) & Plugins ---------------------
# Automatic bootstrap of TPM if missing
if-shell "test ! -d ~/.tmux/plugins/tpm" \
  "run-shell 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Declarative plugin list (synchronized from amane's nix tmux module)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'schasse/tmux-jump'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'sinkerine/tmux-omni-search'
set -g @plugin 'tmux-plugins/tmux-continuum'

# --------------------- Plugin Configurations ---------------------
# Extrakto options
set -g @extrakto_fzf_tool fzf
set -g @extrakto_key o
set -g @extrakto_split_size 20
set -g @extrakto_fzf_options "$FZF_DEFAULT_OPTS"
set -g @extrakto_opts "path/url word lines"
set -g @extrakto_clip_tool "pbcopy"

# Tmux jump options
set -g @jump-key 't'

# Tmux continuum options (requires status line to stay on for autosaves)
set -g status on
set -g @continuum-restore 'on'

# Tmux omni search options
set -g @omni-search-launch-key 'S'

# Run TPM (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
